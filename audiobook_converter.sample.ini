[paths]
source_dir = /path/to/incoming/audiobooks
target_dir = /path/to/converted/output
converted_dir = /path/to/originals/archive

[encoding]
max_bitrate = 64
codec = libfdk_aac
fallback_codec = aac

[general]
log_file = audiobook_converter.log

[display]
use_color = true
use_emoji = true

[artwork]
extract_cover = false
cover_dir = /path/to/extracted/covers

[reporting]
run_history_csv = audiobook_converter_runs.csv
